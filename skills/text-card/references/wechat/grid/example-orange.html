<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --card-width: 2680px;
        --card-height: 800px;
        --left-width: 1880px;
        --right-width: 800px;
        --bg: #f5f5f0;
        --highlight: #ec5a0c;
        --main-text: #1a1a1a;
        --label-text: #888888;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        margin: 0;
        font-family: "Noto Sans CJK SC", "Noto Sans SC", "Noto Sans",
          sans-serif;
        display: grid;
        place-items: start center;
      }

      #card {
        width: var(--card-width);
        height: var(--card-height);
        overflow: hidden;
        display: flex;
      }

      .cover-left {
        position: relative;
        width: var(--left-width);
        height: 100%;
        background-color: var(--bg);
        background-image: linear-gradient(
            rgba(0, 0, 0, 0.06) 1px,
            transparent 1px
          ),
          linear-gradient(90deg, rgba(0, 0, 0, 0.06) 1px, transparent 1px);
        background-size: 52px 52px;
      }

      .cover-right {
        position: relative;
        width: var(--right-width);
        height: 100%;
        background-color: var(--bg);
        background-image: linear-gradient(
            rgba(0, 0, 0, 0.06) 1px,
            transparent 1px
          ),
          linear-gradient(90deg, rgba(0, 0, 0, 0.06) 1px, transparent 1px);
        background-size: 52px 52px;
      }

      .x-mark {
        position: absolute;
        top: 32px;
        left: 52px;
        font-size: 26px;
        color: var(--label-text);
        line-height: 1;
      }

      .category {
        position: absolute;
        top: 68px;
        left: 52px;
        font-size: 38px;
        font-weight: 800;
        line-height: 1.4;
        color: var(--main-text);
        letter-spacing: 1px;
      }

      .headline-area {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        white-space: nowrap;
      }

      .headline {
        font-size: 210px;
        font-weight: 900;
        line-height: 1.18;
        color: var(--main-text);
        letter-spacing: 16px;
        -webkit-text-stroke: 2px var(--main-text);
      }

      .highlight-line {
        display: inline-block;
        position: relative;
        margin-top: 4px;
      }

      .highlight-line::before {
        content: "";
        position: absolute;
        left: 0;
        top: 10%;
        width: 100%;
        height: 90%;
        background: var(--highlight);
        z-index: 0;
      }

      .highlight-text {
        position: relative;
        z-index: 1;
        font-size: 210px;
        font-weight: 900;
        line-height: 1.18;
        color: var(--main-text);
        letter-spacing: 16px;
        -webkit-text-stroke: 2px var(--main-text);
      }

      .circle-deco {
        position: absolute;
        top: 52px;
        right: 52px;
        width: 320px;
        height: 290px;
      }

      .circle-outline {
        position: absolute;
        right: 0;
        top: 0;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        border: 5px solid var(--main-text);
      }

      .circle-filled {
        position: absolute;
        left: 0;
        top: 30px;
        width: 210px;
        height: 210px;
        border-radius: 50%;
        background: var(--highlight);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .circle-filled::after {
        content: "*";
        font-size: 72px;
        font-weight: 900;
        color: var(--main-text);
        line-height: 1;
      }

      .accent-text {
        position: absolute;
        bottom: 72px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 150px;
        font-weight: 900;
        color: var(--main-text);
        letter-spacing: 12px;
        -webkit-text-stroke: 2px var(--main-text);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div class="cover-left">
        <div class="x-mark">×</div>
        <div class="category">WEWORK BOT</div>
        <div class="headline-area">
          <div class="headline">企微智器</div>
          <div class="highlight-line">
            <span class="highlight-text">办公革新</span>
          </div>
        </div>
      </div>

      <div class="cover-right">
        <div class="circle-deco">
          <div class="circle-outline"></div>
          <div class="circle-filled"></div>
        </div>
        <div class="accent-text">智能办公</div>
      </div>
    </div>
  </body>
</html>
