<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --card-width: 1080px;
        --card-height: 1440px;
        --bg: #cef0ff;
        --text: #2f3a4a;
        --quote: #a3d5f2;
        --accent: #fdb8f6;
        --dash: #a3d5f2;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Noto Sans CJK SC", "Noto Sans SC", "Noto Sans",
          sans-serif;
        display: grid;
        place-items: start center;
      }

      #card {
        position: relative;
        width: var(--card-width);
        height: var(--card-height);
        aspect-ratio: 3 / 4;
        overflow: hidden;
        background: var(--bg);
      }

      .quote-mark {
        position: absolute;
        top: 96px;
        left: 66px;
        width: 217px;
        height: 187px;
        color: var(--quote);
        opacity: 0.95;
      }

      .quote-mark svg,
      .dash svg {
        display: block;
        width: 100%;
        height: 100%;
        fill: currentColor;
      }

      .content {
        position: absolute;
        top: 304px;
        bottom: 191px;
        left: 90px;
        width: 878px;
        display: grid;
        align-content: center;
        transform: translateY(-70px);
      }

      .content-text {
        color: var(--text);
        font-size: 104px;
        line-height: 1.32;
        font-weight: 550;
        letter-spacing: 3px;
        white-space: normal;
        word-break: normal;
        overflow-wrap: normal;
      }

      .highlight {
        position: relative;
        display: inline-block;
        white-space: nowrap;
        z-index: 0;
      }

      .highlight::after {
        content: "";
        position: absolute;
        left: 4px;
        right: 4px;
        bottom: 9px;
        height: 31px;
        background: var(--accent);
        z-index: -1;
        border-radius: 10px;
      }

      .dash {
        position: absolute;
        right: 94px;
        bottom: 111px;
        width: 104px;
        height: 21px;
        color: var(--dash);
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div class="quote-mark">
        <svg viewBox="0 0 1195 1024" xmlns="http://www.w3.org/2000/svg">
          <path d="M1125.4 972.815H651.636V631.106c0-139.404 12.083-248.772 36.25-328.108 24.165-79.336 49.296-132.298 115.05-195.766C868.69 43.763 914.313 24.718 1010.828 0l67.428 145.03c-67.428 25.767-108.507 37.26-171.865 102.994-63.358 65.735-68.03 129.316-68.03 183.965h287.04v540.826z m-651.636 0H0V631.106c0-139.404 12.083-248.772 36.249-328.108 24.166-79.336 49.296-132.298 115.05-195.766C217.054 43.763 262.676 24.718 359.192 0l67.428 145.03c-67.428 25.767-108.507 37.26-171.865 102.994-63.358 65.735-68.031 129.316-68.031 183.965h287.04v540.826z"></path>
        </svg>
      </div>

      <div class="content">
        <div class="content-text">
          加入<span class="highlight">方圆AI社区</span>，了解 AI 工具、<span class="highlight">通俗易懂</span>的方法和实践内容
        </div>
      </div>

      <div class="dash">
        <svg viewBox="0 0 44 10" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="44" height="10" rx="1"></rect>
        </svg>
      </div>
    </div>
  </body>
</html>
